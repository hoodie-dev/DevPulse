<div class="max-w-7xl mx-auto p-6">
  
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Project Workspace</h1>
    <p class="text-sm text-slate-500 mt-1">Project Identifier: <span class="font-mono bg-slate-100 px-1 py-0.5 rounded text-xs text-slate-700">{{ projectId() }}</span></p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
    
    <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm h-fit">
      <h2 class="text-lg font-bold text-slate-900 mb-4">Create New Issue</h2>
      
      <form (ngSubmit)="onCreateIssue()" #issueForm="ngForm">
        <div class="mb-4">
          <label class="block text-xs font-semibold text-slate-700 uppercase tracking-wider mb-2">Issue Title</label>
          <input type="text" name="title" [(ngModel)]="issueTitle" required placeholder="e.g., Fix API timeout bug"
                 class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>

        <div class="mb-4">
          <label class="block text-xs font-semibold text-slate-700 uppercase tracking-wider mb-2">Description</label>
          <textarea name="description" [(ngModel)]="issueDescription" rows="4" placeholder="Describe the task criteria..."
                    class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"></textarea>
        </div>

        <div class="mb-6">
          <label class="block text-xs font-semibold text-slate-700 uppercase tracking-wider mb-2">Priority Level</label>
          <select name="priority" [(ngModel)]="selectedPriority"
                  class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
            <option [value]="PriorityEnum.Low">Low Priority</option>
            <option [value]="PriorityEnum.Medium">Medium Priority</option>
            <option [value]="PriorityEnum.High">High Priority</option>
          </select>
        </div>

        <button type="submit" [disabled]="!issueForm.form.valid"
                class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-semibold text-sm py-2.5 px-4 rounded-lg transition duration-150">
          + Add to Backlog
        </button>
      </form>
    </div>

    <div class="lg:col-span-2 grid grid-cols-1 md:grid-cols-3 gap-4">
      
      <div class="bg-slate-50 p-4 rounded-xl border border-slate-200/60 min-h-[500px]">
        <div class="flex justify-between items-center mb-4">
          <span class="text-sm font-bold text-slate-700 tracking-wide uppercase">📋 To Do</span>
          <span class="bg-slate-200 text-slate-700 text-xs px-2 py-0.5 rounded-full font-bold">0</span>
        </div>
        <div class="border-2 border-dashed border-slate-200 rounded-lg p-6 text-center text-xs text-slate-400 font-medium">
          No active issues in backlog
        </div>
      </div>

      <div class="bg-slate-50 p-4 rounded-xl border border-slate-200/60 min-h-[500px]">
        <div class="flex justify-between items-center mb-4">
          <span class="text-sm font-bold text-blue-700 tracking-wide uppercase">⚡ In Progress</span>
          <span class="bg-blue-100 text-blue-700 text-xs px-2 py-0.5 rounded-full font-bold">0</span>
        </div>
      </div>

      <div class="bg-slate-50 p-4 rounded-xl border border-slate-200/60 min-h-[500px]">
        <div class="flex justify-between items-center mb-4">
          <span class="text-sm font-bold text-emerald-700 tracking-wide uppercase">✅ Done</span>
          <span class="bg-emerald-100 text-emerald-700 text-xs px-2 py-0.5 rounded-full font-bold">0</span>
        </div>
      </div>

    </div>

  </div>
</div>

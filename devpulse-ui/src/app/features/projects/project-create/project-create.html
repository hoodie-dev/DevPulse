<div class="max-w-xl mx-auto bg-white rounded-xl shadow-md border border-slate-200 p-8 mt-10">
  <h2 class="text-2xl font-bold text-slate-800 mb-2">Create New Project</h2>
  <p class="text-sm text-slate-500 mb-6">Initialize a new tracking workspace for your development team.</p>

  @if (showSuccess()) {
    <div class="mb-6 p-4 bg-emerald-50 border border-emerald-200 rounded-lg flex items-start space-x-3 text-emerald-800 animate-fade-in">
      <svg class="w-5 h-5 text-emerald-600 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <div>
        <h4 class="font-semibold">Project Saved Successfully!</h4>
        <p class="text-xs text-emerald-700 mt-0.5">The pipeline executed cleanly and records have been committed to SQL Server.</p>
      </div>
    </div>
  }

  <form (ngSubmit)="onSubmit()" class="space-y-5" >
    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-1">Project Name</label>
      <input type="text" name="projectName" [(ngModel)]="projectName" placeholder="e.g., DevPulse Dashboard" 
             class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" />
    </div>

    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-1">Project Code (Max 5 chars)</label>
      <input type="text" name="projectCode" [(ngModel)]="projectCode" placeholder="e.g., DEVP" max-length="5"
             class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition uppercase" />
    </div>

    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-1">Description</label>
      <textarea rows="4" name="description" [(ngModel)]="description" placeholder="Describe the core goals of this project..." 
                class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"></textarea>
    </div>

    <div class="pt-2">
      <button type="submit" 
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-lg transition-colors shadow-sm shadow-blue-200">
        Save Project Setup
      </button>
    </div>
  </form>
</div>
